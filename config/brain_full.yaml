# Full BRAIN catalog profile for service / closed-loop submission.
# Local sample OHLCV remains in place only as lightweight regime context.
# Alpha generation itself can use the full field catalog snapshot under inputs/wq_snapshots.

data:
  path: examples/sample_data/daily_ohlcv.csv
  format: csv
  input_layout: canonical
  default_timeframe: 1d
  selected_timeframe: 1d
  filename_pattern: "{symbol}_{timeframe}.csv"
  column_mapping: {}
  universe: ["AAA", "BBB", "CCC", "DDD"]

aux_data:
  group_path: examples/sample_data/symbol_metadata.csv
  factor_path: examples/sample_data/symbol_metadata.csv
  mask_path: examples/sample_data/symbol_metadata.csv
  format: csv
  timestamp_column: timestamp
  symbol_column: symbol
  group_columns: ["sector", "industry", "country", "subindustry"]
  factor_columns: ["beta", "size", "volatility", "liquidity"]
  mask_columns: ["core_mask", "liquid_mask"]
  column_mapping: {}

splits:
  train:
    start: "2021-01-01"
    end: "2021-02-12"
  validation:
    start: "2021-02-15"
    end: "2021-03-05"
  test:
    start: "2021-03-08"
    end: "2021-03-31"

generation:
  allowed_fields: []
  allowed_operators:
    [
      "ts_delay",
      "ts_delta",
      "rank",
      "zscore",
      "ts_corr",
      "ts_covariance",
      "ts_decay_linear",
      "ts_rank",
      "ts_sum",
      "days_from_last_change",
      "ts_av_diff",
      "ts_scale",
      "ts_arg_max",
      "ts_arg_min",
      "quantile",
      "inverse",
      "reverse",
      "ts_count_nans",
      "min",
      "max",
      "ts_mean",
      "ts_std_dev",
      "ts_min",
      "ts_max",
      "sign",
      "abs",
      "log",
      "group_rank",
      "group_zscore",
      "group_neutralize",
    ]
  lookbacks: [10, 20, 60, 100, 250]
  max_depth: 7
  complexity_limit: 20
  template_count: 30
  grammar_count: 30
  mutation_count: 15
  normalization_wrappers: ["rank", "zscore", "sign"]
  random_seed: 42
  engine_validation_cache_enabled: true
  field_catalog_paths:
    - inputs/wq_snapshots/2026-03-29/Price Volumn
    - inputs/wq_snapshots/2026-03-29/Fundamental
    - inputs/wq_snapshots/2026-03-29/Earnings
    - inputs/wq_snapshots/2026-03-29/Analyst
    - inputs/wq_snapshots/2026-03-29/Model
  operator_catalog_paths:
    - inputs/wq_snapshots/2026-03-29/operators/brain_operator_catalog.json
  allow_catalog_fields_without_runtime: true

adaptive_generation:
  enabled: true
  memory_scope: regime
  success_rule: validation_first
  strategy_mix:
    guided_mutation: 0.40
    memory_templates: 0.30
    random_exploration: 0.20
    novelty_behavior: 0.10
  exploration_epsilon: 0.10
  sampling_temperature: 0.75
  family_cap_fraction: 0.18
  parent_pool_size: 30
  novelty_reference_top_k: 20
  min_pattern_support: 3
  pattern_decay: 0.98
  max_generation_seconds: 20
  max_attempt_multiplier: 12
  max_consecutive_failures: 400
  min_candidates_before_early_exit: 5
  exploration_ratio: 0.45
  novelty_weight: 0.25
  mutation_mode_weights:
    exploit_local: 0.25
    structural: 0.20
    crossover: 0.20
    novelty: 0.20
    repair: 0.15
  crossover_rate: 0.15
  diversity:
    max_family_fraction: 0.25
    max_field_category_fraction: 0.40
    max_horizon_bucket_fraction: 0.40
    max_operator_path_fraction: 0.30
    exploration_quota_fraction: 0.20
    min_structural_distance: 0.08
  selection:
    pre_sim:
      family_correlation_proxy_penalty: 0.10
      brain_robustness_proxy_penalty: 0.35
      elite_motif_bonus: 0.04
      elite_seed_similarity_penalty: 0.20
    brain_robustness_proxy:
      enabled: true
      lookback_rounds: 12
      min_support: 3
      sharpe_floor: 0.30
      fitness_floor: 0.10
  repair_policy:
    enabled: true
    max_attempts: 3
    allow_complexity_reduction: true
    allow_turnover_reduction: true
    allow_wrapper_cleanup: true
    allow_group_fixups: true
  critic_thresholds:
    turnover_warning_fraction: 0.85
    overfit_gap_threshold: 0.35
    complexity_warning_fraction: 0.80
    noisy_short_horizon_max_lookback: 3
    novelty_success_threshold: 0.70
    score_prior_weight: 3.0
  region_learning:
    enabled: true
    local_scope: region_regime
    global_prior_scope: match_non_region_regime
    blend_mode: linear_ramp
    min_local_pattern_samples: 20
    full_local_pattern_samples: 100
    min_local_case_samples: 10
    full_local_case_samples: 50
    allow_global_parent_fallback: false
  meta_model:
    enabled: true
    rollout_mode: blend
    target: positive_outcome
    model_type: logistic_regression
    blend_weight: 0.20
    min_train_rows: 500
    min_positive_rows: 50
    lookback_rounds: 1500
    use_cross_run_history: true
  learned_regime:
    enabled: true
    model_type: minibatch_kmeans
    cluster_count: 6
    history_window: 252
    feature_window: 63
    min_train_windows: 120
    confidence_floor: 0.35
    tsfresh_profile: minimal
  local_validation_field_penalty:
    enabled: true
    lookback_rounds: 20
    min_count: 2
    max_fields: 200
    penalty_strength: 1.0
    min_multiplier: 0.10
    sample_limit: 10
  search_space_filter:
    enabled: true
    profile_mismatch_multiplier: 0.25
    unknown_profile_multiplier: 0.75
    validation_field_multiplier: 0.35
    validation_field_min_count: 2
    completed_lookback_rounds: 20
    min_completed_support: 3
    sharpe_floor: 0.30
    fitness_floor: 0.10
    field_result_multiplier: 0.50
    operator_result_multiplier: 0.60
    winner_prior_enabled: true
    winner_prior_lookback_rounds: 20
    winner_prior_min_support: 2
    winner_prior_sharpe_floor: 0.30
    winner_prior_fitness_floor: 0.10
    winner_prior_strong_sharpe_floor: 0.50
    winner_prior_strong_fitness_floor: 0.30
    winner_field_multiplier: 1.35
    strong_winner_field_multiplier: 1.80
    weak_field_multiplier: 0.65
    winner_operator_multiplier: 1.35
    strong_winner_operator_multiplier: 1.80
    weak_operator_multiplier: 0.65
    lane_field_caps:
      recipe_guided: 60
      fresh: 60
    lane_field_min_count: 30
    lane_operator_allowlists:
      quality_polish:
        [
          "rank",
          "zscore",
          "quantile",
          "ts_mean",
          "ts_decay_linear",
          "ts_std_dev",
          "ts_rank",
          "ts_sum",
          "ts_scale",
          "ts_arg_max",
          "ts_arg_min",
          "days_from_last_change",
          "ts_av_diff",
          "ts_count_nans",
          "inverse",
          "reverse",
          "sign",
          "abs",
          "min",
          "max",
          "group_neutralize",
        ]
      recipe_guided:
        [
          "rank",
          "zscore",
          "quantile",
          "ts_mean",
          "ts_std_dev",
          "ts_scale",
          "ts_av_diff",
          "ts_arg_max",
          "ts_arg_min",
          "ts_count_nans",
          "min",
          "max",
          "inverse",
          "reverse",
          "days_from_last_change",
        ]
      fresh:
        [
          "rank",
          "zscore",
          "ts_mean",
          "ts_decay_linear",
          "ts_std_dev",
          "ts_rank",
          "ts_sum",
          "ts_scale",
          "days_from_last_change",
          "ts_av_diff",
          "ts_count_nans",
          "sign",
          "abs",
          "min",
          "max",
          "group_neutralize",
        ]
  recipe_generation:
    enabled: true
    recipe_budget_fraction: 0.18
    max_recipe_candidates_per_round: 20
    active_bucket_count: 2
    max_candidates_per_bucket: 4
    max_field_candidates_per_side: 8
    max_pair_candidates_per_bucket: 12
    max_drafts_per_bucket: 64
    duplicate_retry_multiplier: 4
    enable_field_rotation: true
    field_rotation_lookback_rounds: 12
    yield_lookback_rounds: 12
    lookback_completed_results: 800
    selection_prior_weight: 0.08
    min_bucket_support_for_penalty: 5
    dynamic_budget_enabled: true
    dynamic_budget_min_generated_support: 10
    dynamic_budget_min_completed_support: 3
    bucket_suppression_enabled: true
    bucket_suppression_min_support: 3
    bucket_suppression_sharpe_floor: 0.30
    bucket_suppression_fitness_floor: 0.10
    bucket_suppression_max_candidates: 1
    source_exploration_floor_fractions:
      quality_polish: 0.24
      recipe_guided: 0.10
      fresh: 0.08
    source_reallocation_strength: 0.65
    max_fresh_budget_fraction: 0.26
    fresh_spillover_fraction: 0.03
    bucket_exploration_floor: 1
    bucket_reallocation_strength: 0.75
    bucket_biases:
      "fundamental_quality|fundamental|balanced": 1.05
      "fundamental_quality|fundamental|quality": 1.00
      "fundamental_quality|fundamental|low_turnover": 0.95
      "value_vs_growth|fundamental|balanced": 0.85
      "value_vs_growth|fundamental|quality": 0.80
      "value_vs_growth|fundamental|low_turnover": 0.65
      "revision_surprise|fundamental|balanced": 0.25
      "revision_surprise|fundamental|quality": 0.25
      "revision_surprise|fundamental|low_turnover": 0.25
      "accrual_vs_cashflow|fundamental|balanced": 0.25
      "accrual_vs_cashflow|fundamental|quality": 0.25
      "accrual_vs_cashflow|fundamental|low_turnover": 0.25
      "analyst_estimate_recency|analyst|balanced": 1.45
      "analyst_estimate_recency|analyst|quality": 1.35
      "analyst_estimate_recency|analyst|low_turnover": 1.10
      "analyst_estimate_stability|analyst|balanced": 1.55
      "analyst_estimate_stability|analyst|quality": 1.60
      "analyst_estimate_stability|analyst|low_turnover": 1.25
      "analyst_profitability_spread|analyst|balanced": 0.90
      "analyst_profitability_spread|analyst|quality": 0.85
      "analyst_profitability_spread|analyst|low_turnover": 0.70
      "returns_term_structure|returns|balanced": 0.25
      "returns_term_structure|returns|quality": 0.25
      "returns_term_structure|returns|low_turnover": 0.25
    enabled_recipe_families:
      - fundamental_quality
      - accrual_vs_cashflow
      - value_vs_growth
      - revision_surprise
      - analyst_estimate_recency
      - analyst_estimate_stability
      - analyst_profitability_spread
      - returns_term_structure
    objective_profiles:
      - balanced
      - quality
      - low_turnover
  quality_optimization:
    enabled: true
    lookback_completed_results: 800
    polish_budget_fraction: 0.22
    max_polish_candidates_per_round: 24
    max_polish_parents_per_round: 12
    variants_per_parent: 10
    min_parent_fitness: 0.02
    min_parent_sharpe: 0.03
    max_parent_turnover: 1.00
    max_parent_drawdown: 0.75
    min_completed_parent_count: 5
    selection_prior_weight: 0.14
    parent_scan_multiplier: 6
    enabled_transforms: ["wrap_rank", "wrap_zscore", "window_perturb", "smooth_ts_mean", "smooth_ts_decay_linear"]
    primary_transform: "wrap_rank"
    max_variants_per_parent_by_transform:
      wrap_rank: 1
      wrap_zscore: 1
      window_perturb: 4
      smooth_ts_mean: 3
      smooth_ts_decay_linear: 3
    parent_transform_recent_rounds: 2
    max_parent_transform_uses_per_recent_window: 1
    transform_score_lookback_rounds: 4
    transform_cooldown_min_attempts: 3
    transform_cooldown_success_rate_floor: 0.20
    cooldown_exempt_transform_groups: ["smooth_ts_mean", "smooth_ts_decay_linear"]
    window_perturb_neighbor_count: 4
    disabled_transforms:
      - cleanup_redundant_wrapper
      - smooth_ts_rank
  elite_motifs:
    enabled: true
    lookbacks: [125, 145, 150]
    clone_similarity_threshold: 0.70
    max_quality_polish_seeds_per_round: 6
    max_seed_variants_per_seed: 4
    seed_expressions:
      - "rank(ts_mean(anl69_cpss_best_eeps_nxt_yr,125))"
      - "zscore(ts_scale(anl69_eps_best_eeps_cur_yr,145))"
      - "-rank(days_from_last_change(anl69_cps_expected_report_dt))"
      - "rank(ts_av_diff(anl69_ebit_best_eeps_nxt_yr,150))"
      - "rank(ts_arg_max(anl69_net_best_eeps_cur_yr,145))"
      - "-rank(ts_count_nans(anl69_epss_best_eeps_nxt_yr,125))"
      - "rank(quantile(anl69_pe_best_eeps_nxt_yr))"
      - "rank(reverse(inverse(anl69_dpss_best_eeps_cur_yr)))"
      - "rank(max(ts_mean(anl69_cpss_best_eeps_cur_yr,145),zscore(anl69_eps_best_eeps_cur_yr)))"
      - "rank(ts_std_dev((anl69_ebit_best_eeps_cur_yr-anl69_net_best_eeps_cur_yr),150))"

simulation:
  delay_mode: fast_d1
  neutralization: sector
  secondary_neutralization: country
  pasteurize: true
  signal_clip: 5.0
  weight_clip: 0.35
  factor_columns: ["beta", "size", "volatility", "liquidity"]
  subuniverses:
    - name: liquid
      mask_field: liquid_mask
    - name: large_cap
      top_n_by: size
      top_n: 2
  robustness_windows: [21, 42]
  cache_enabled: true

backtest:
  timeframe: 1d
  mode: cross_sectional
  portfolio_construction: long_short
  selection_fraction: 0.34
  signal_delay: 1
  holding_period: 3
  volatility_scaling: true
  volatility_lookback: 5
  transaction_cost_bps: 5.0
  annualization_factor: 252
  symbol_rank_window: 10
  upper_quantile: 0.8
  lower_quantile: 0.2
  turnover_penalty: 0.10
  drawdown_penalty: 0.50

evaluation:
  hard_filters:
    min_validation_sharpe: -0.25
    max_validation_turnover: 5.0
    max_validation_drawdown: 0.95
  data_requirements:
    min_validation_observations: 5
    min_stability: 0.05
  diversity:
    signal_correlation_threshold: 0.95
    returns_correlation_threshold: 0.95
  ranking:
    top_k: 10
    use_behavioral_novelty_tiebreak: true
  robustness:
    enable_subuniverse_test: true
    enable_ladder_test: true
    enable_robustness_test: true
    ladder_buckets: 3
    ladder_min_sharpe: -0.25
    ladder_min_passes: 2
    subuniverse_min_sharpe: -3.0
    subuniverse_min_pass_fraction: 0.5
    robustness_min_fitness_ratio: -2.0

storage:
  path: dev_wq_tool.sqlite3

brain:
  backend: api
  region: USA
  universe: TOP3000
  delay: 1
  neutralization: SUBINDUSTRY
  decay: 5
  truncation: 0.01
  pasteurization: true
  unit_handling: verify
  nan_handling: off
  simulation_profiles:
    - name: fixed_laboratory_usa
      region: USA
      universe: TOP3000
      delay: 1
      neutralization: SUBINDUSTRY
      decay: 5
      truncation: 0.01
      weight: 1.0
  poll_interval_seconds: 5
  timeout_seconds: 600
  max_retries: 2
  batch_size: 10
  manual_export_dir: outputs/brain_manual
  api_base_url: "https://api.worldquantbrain.com"
  api_auth_env: BRAIN_API_TOKEN
  email_env: BRAIN_API_EMAIL
  password_env: BRAIN_API_PASSWORD
  credentials_file: secrets/brain_credentials.json
  session_path: outputs/brain_api_session.json
  auth_expiry_seconds: 14400
  open_browser_for_persona: false
  persona_poll_interval_seconds: 15
  persona_timeout_seconds: 1800
  rate_limit_per_minute: 60

loop:
  rounds: 3
  generation_batch_size: 100
  simulation_batch_size: 20
  poll_interval_seconds: 5
  timeout_seconds: 300
  mutate_top_k: 5
  max_children_per_parent: 3
  rejection_filters: []
  archive_thresholds: {}

service:
  enabled: false
  tick_interval_seconds: 5
  idle_sleep_seconds: 15
  poll_interval_seconds: 5
  max_pending_jobs: 10
  max_consecutive_failures: 50
  cooldown_seconds: 10
  heartbeat_interval_seconds: 15
  lock_name: brain-service
  lock_lease_seconds: 60
  resume_incomplete_jobs: true
  ambiguous_submission_policy: resubmit
  shutdown_grace_period_seconds: 30
  stuck_job_after_seconds: 1800
  persona_retry_interval_seconds: 30
  persona_email_cooldown_seconds: 600
  persona_confirmation_required: true
  persona_confirmation_poll_interval_seconds: 30
  persona_confirmation_prompt_cooldown_seconds: 600
  persona_confirmation_granted_ttl_seconds: 300
  research_context_cache_enabled: true
  research_context_cache_ttl_seconds: 0
  observed_limit_ttl_seconds: 1800
  observed_limit_probe_interval_seconds: 300

runtime:
  log_level: INFO
  fail_fast: false
  profile_name: brain_full
