# Dev profile keeps the sample universe, loose thresholds, and smaller generation counts
# so contributors can iterate quickly on the bundled demo dataset.

data:
  path: examples/sample_data/daily_ohlcv.csv
  format: csv
  input_layout: canonical
  default_timeframe: 1d
  selected_timeframe: 1d
  filename_pattern: "{symbol}_{timeframe}.csv"
  column_mapping: {}
  universe: ["AAA", "BBB", "CCC", "DDD"]

aux_data:
  group_path: examples/sample_data/symbol_metadata.csv
  factor_path: examples/sample_data/symbol_metadata.csv
  mask_path: examples/sample_data/symbol_metadata.csv
  format: csv
  timestamp_column: timestamp
  symbol_column: symbol
  group_columns: ["sector", "industry", "country", "subindustry"]
  factor_columns: ["beta", "size", "volatility", "liquidity"]
  mask_columns: ["core_mask", "liquid_mask"]
  column_mapping: {}

splits:
  train:
    start: "2021-01-01"
    end: "2021-02-12"
  validation:
    start: "2021-02-15"
    end: "2021-03-05"
  test:
    start: "2021-03-08"
    end: "2021-03-31"

generation:
  allowed_fields: ["open", "high", "low", "close", "volume", "returns"]
  allowed_operators:
    [
      "ts_delay",
      "ts_delta",
      "rank",
      "zscore",
      "ts_corr",
      "ts_covariance",
      "ts_decay_linear",
      "ts_rank",
      "ts_sum",
      "ts_mean",
      "ts_std_dev",
      "ts_min",
      "ts_max",
      "sign",
      "abs",
      "log",
      "group_rank",
      "group_zscore",
      "group_neutralize",
    ]
  lookbacks: [2, 3, 5, 10]
  max_depth: 4
  complexity_limit: 20
  template_count: 30
  grammar_count: 30
  mutation_count: 15
  normalization_wrappers: ["rank", "zscore", "sign"]
  random_seed: 42
  operator_catalog_paths:
    - inputs/wq_snapshots/2026-03-29/operators/brain_operator_catalog.json

adaptive_generation:
  enabled: true
  memory_scope: regime
  success_rule: validation_first
  strategy_mix:
    guided_mutation: 0.40
    memory_templates: 0.30
    random_exploration: 0.20
    novelty_behavior: 0.10
  exploration_epsilon: 0.10
  sampling_temperature: 0.75
  family_cap_fraction: 0.25
  parent_pool_size: 30
  novelty_reference_top_k: 20
  min_pattern_support: 3
  pattern_decay: 0.98
  exploration_ratio: 0.35
  novelty_weight: 0.25
  mutation_mode_weights:
    exploit_local: 0.35
    structural: 0.25
    crossover: 0.15
    novelty: 0.15
    repair: 0.10
  crossover_rate: 0.15
  diversity:
    max_family_fraction: 0.25
    max_field_category_fraction: 0.50
    max_horizon_bucket_fraction: 0.40
    max_operator_path_fraction: 0.40
    exploration_quota_fraction: 0.20
    min_structural_distance: 0.08
  repair_policy:
    enabled: true
    max_attempts: 3
    allow_complexity_reduction: true
    allow_turnover_reduction: true
    allow_wrapper_cleanup: true
    allow_group_fixups: true
  critic_thresholds:
    turnover_warning_fraction: 0.85
    overfit_gap_threshold: 0.35
    complexity_warning_fraction: 0.80
    noisy_short_horizon_max_lookback: 3
    novelty_success_threshold: 0.70
    score_prior_weight: 3.0
  region_learning:
    enabled: true
    local_scope: region_regime
    global_prior_scope: match_non_region_regime
    blend_mode: linear_ramp
    min_local_pattern_samples: 20
    full_local_pattern_samples: 100
    min_local_case_samples: 10
    full_local_case_samples: 50
    allow_global_parent_fallback: false

simulation:
  delay_mode: fast_d1
  neutralization: sector
  secondary_neutralization: country
  pasteurize: true
  signal_clip: 5.0
  weight_clip: 0.35
  factor_columns: ["beta", "size", "volatility", "liquidity"]
  subuniverses:
    - name: liquid
      mask_field: liquid_mask
    - name: large_cap
      top_n_by: size
      top_n: 2
  robustness_windows: [21, 42]
  cache_enabled: true

backtest:
  timeframe: 1d
  mode: cross_sectional
  portfolio_construction: long_short
  selection_fraction: 0.34
  signal_delay: 1
  holding_period: 3
  volatility_scaling: true
  volatility_lookback: 5
  transaction_cost_bps: 5.0
  annualization_factor: 252
  symbol_rank_window: 10
  upper_quantile: 0.8
  lower_quantile: 0.2
  turnover_penalty: 0.10
  drawdown_penalty: 0.50

evaluation:
  hard_filters:
    min_validation_sharpe: -0.25
    max_validation_turnover: 5.0
    max_validation_drawdown: 0.95
  data_requirements:
    min_validation_observations: 5
    min_stability: 0.05
  diversity:
    signal_correlation_threshold: 0.95
    returns_correlation_threshold: 0.95
  ranking:
    top_k: 10
    use_behavioral_novelty_tiebreak: true
  robustness:
    enable_subuniverse_test: true
    enable_ladder_test: true
    enable_robustness_test: true
    ladder_buckets: 3
    ladder_min_sharpe: -0.25
    ladder_min_passes: 2
    subuniverse_min_sharpe: -3.0
    subuniverse_min_pass_fraction: 0.5
    robustness_min_fitness_ratio: -2.0

storage:
  path: dev_wq_tool.sqlite3

brain:
  backend: api
  region: USA
  universe: TOP3000
  delay: 1
  neutralization: sector
  decay: 0
  truncation: 0.08
  pasteurization: true
  unit_handling: verify
  nan_handling: off
  poll_interval_seconds: 5
  timeout_seconds: 120
  max_retries: 2
  batch_size: 3
  manual_export_dir: outputs/brain_manual
  api_base_url: "https://api.worldquantbrain.com"
  api_auth_env: BRAIN_API_TOKEN
  email_env: BRAIN_API_EMAIL
  password_env: BRAIN_API_PASSWORD
  credentials_file: secrets/brain_credentials.json
  session_path: outputs/brain_api_session.json
  auth_expiry_seconds: 14400
  open_browser_for_persona: true
  persona_poll_interval_seconds: 15
  persona_timeout_seconds: 1800
  rate_limit_per_minute: 60

loop:
  rounds: 3
  generation_batch_size: 40
  simulation_batch_size: 3
  poll_interval_seconds: 5
  timeout_seconds: 120
  mutate_top_k: 5
  max_children_per_parent: 3
  rejection_filters: []
  archive_thresholds: {}

service:
  enabled: false
  tick_interval_seconds: 5
  idle_sleep_seconds: 15
  poll_interval_seconds: 5
  max_pending_jobs: 3
  max_consecutive_failures: 5
  cooldown_seconds: 120
  heartbeat_interval_seconds: 15
  lock_name: brain-service
  lock_lease_seconds: 60
  resume_incomplete_jobs: true
  shutdown_grace_period_seconds: 30
  stuck_job_after_seconds: 600
  persona_retry_interval_seconds: 30
  persona_email_cooldown_seconds: 600

runtime:
  log_level: INFO
  fail_fast: false
  profile_name: dev
